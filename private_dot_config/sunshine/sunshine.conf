# Sunshine configuration for iPhone (Moonlight) streaming over Tailscale
# Web UI: https://<tailscale-ip>:47990  (初回ペアリング時に PIN 入力)

# ---- Network ----
# Tailscale 前提。LAN/WAN 両方のインターフェースにバインドしておき、
# 実アクセスは Tailscale ACL でのみ許可される想定。UPnP は不要。
address_family = both
upnp = disabled
origin_web_ui_allowed = lan

# ---- Capture (Wayland / Hyprland) ----
# Hyprland は wlroots ベースなので KMS 直キャプチャを使う。
# `setcap cap_sys_admin+p /usr/bin/sunshine` が必要（パッケージで付与済）。
capture = kms

# ---- Encoder ----
# GPU 自動検出に任せる。必要に応じて vaapi / nvenc / amfenc に固定可。
# encoder = vaapi

# ---- Streaming quality ----
min_bitrate = 2000
fps = [30, 60, 120]
# iPhone 向けの解像度候補。Moonlight 側からの要求に応じて選択される。
resolutions = [
  1280x720,
  1920x1080,
  2532x1170,
  2556x1179,
  2778x1284,
  2796x1290
]

# ---- Audio ----
# PipeWire / PulseAudio の既定シンクをモニタキャプチャ
audio_sink = @DEFAULT_AUDIO_SINK@.monitor

# ---- Input ----
# iPhone のタッチ/Apple Pencil を絶対座標マウスとして扱う
back_button_timeout = 2000
keybindings = [
  0x10, 0xA0,
  0x11, 0xA2,
  0x12, 0xA4
]

# ---- Logging ----
min_log_level = info
