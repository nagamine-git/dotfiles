# [Tabキーで選択] インジケーターを表示する
showTabToSelect=True
# Enable prediction
EnablePrediction=True
# Number style
NumberStyle=Halfwidth
# Symbol style
SymbolStyle=Fullwidth
# Period style
PeriodStyle="。 (Fullwidth Kuten)"
# Comma style
CommaStyle="、 (Fullwidth Toten)"
# Space style
SpaceStyle=Fullwidth
# Diacritic style
DiacriticStyle=Fullwidth
# Learn mode
LearnMode=True
# Tab で候補選択
ShowTabToSelect=True
# Enable Zenzai (Experimental, Requires Vulkan)
# NOTE: 2026-04 時点で hazkey-server 0.2.1 は Zenzai 有効時に SIGILL で頻繁クラッシュ
# (cf. hazkey v0.2.1-2 + Ryzen 7 7735HS). 安定化のためデフォルト False。
# Hyprland の perfmode 切替スクリプトが必要時に True/False を上書きする。
# さらに弱 GPU (iGPU 等) では perfmode スクリプトが GPU 判定で強制 False に落とす
# (SIGILL 回避)。ディスクリート GPU = NVIDIA/Radeon RX/Navi/Arc のみ Zenzai 許可。
ZenzaiEnabled=False
# Enable Zenzai contextual converision
ZenzaiSurroundingTextEnabled=True
# Zenzai Profile
ZenzaiProfile=
# Zenzai Inference limit
ZenzaiInferenceLimit=1
# GPU Layers
Zenzai GPU Layers=12
